<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scouting EFC - Cantera de Héroes</title>
    
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/en/thumb/5/52/Envigado_FC_logo.svg/1200px-Envigado_FC_logo.svg.png">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/en/thumb/5/52/Envigado_FC_logo.svg/1200px-Envigado_FC_logo.svg.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --efc-orange: #f37021; --efc-green: #008f39; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: #121212; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 10px;
            color: white;
        }

        /* Barra de herramientas minimalista */
        .toolbar {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 500px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-download { 
            background: var(--efc-green); 
            color: white; 
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0, 143, 57, 0.3);
        }
        .btn-download:active { transform: scale(0.95); }

        /* Contenedor de la Cancha */
        #canvas-wrapper { width: 100%; max-width: 500px; position: relative; }
        
        #canvas-container { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 500 / 720; 
            background-color: #1a4d2e; /* Verde césped más oscuro y elegante */
            border: 5px solid #fff; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); 
        }

        /* Líneas del campo */
        .pitch-line { position: absolute; border: 2.5px solid rgba(255,255,255,0.4); pointer-events: none; }
        #half-line { width: 100%; top: 50%; left: 0; border-top: 2.5px solid rgba(255,255,255,0.4); }
        #center-circle { width: 30%; aspect-ratio: 1; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #area-top { width: 56%; height: 16%; top: -2px; left: 50%; transform: translateX(-50%); border-top: none; }
        #area-bottom { width: 56%; height: 16%; bottom: -2px; left: 50%; transform: translateX(-50%); border-bottom: none; }

        /* Escudo Fijo de Envigado FC */
        #club-logo { 
            position: absolute; 
            top: 3%; 
            right: 4%; 
            width: 16%; 
            height: auto; 
            z-index: 25; 
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
        }
        
        /* Título Centrado */
        #team-title { 
            position: absolute; 
            top: 4.5%; 
            left: 0; 
            width: 100%; 
            text-align: center; 
            color: #fff; 
            font-size: 28px; 
            font-weight: 900; 
            text-transform: uppercase; 
            text-shadow: 0 3px 6px rgba(0,0,0,0.8); 
            z-index: 10;
            outline: none;
            padding: 0 15%; /* Espacio para que no choque con el logo */
            box-sizing: border-box;
        }

        /* Jugadores con Fuentes Grandes */
        .player-unit { position: absolute; text-align: center; width: 24%; transform: translate(-50%, -50%); z-index: 5; }
        .dot { 
            width: 28px; 
            height: 28px; 
            background: var(--efc-orange); 
            border: 2.5px solid #fff; 
            border-radius: 50%; 
            margin: 0 auto 6px auto; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }
        .gk .dot { background: #f1c40f; }
        
        .name-box { 
            background: rgba(0,0,0,0.85); 
            padding: 5px; 
            border-radius: 8px; 
            display: inline-block; 
            width: 110%; 
            border: 1.5px solid rgba(255,255,255,0.2); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .starter { 
            color: #fff; 
            font-size: 17px; /* Fuente aumentada */
            font-weight: 800; 
            display: block; 
            outline: none;
            white-space: nowrap;
        }

        .sub { 
            color: #00ff6a; 
            font-size: 12px; /* Fuente aumentada */
            font-style: italic; 
            display: block; 
            border-top: 1px solid rgba(255,255,255,0.3); 
            margin-top: 4px; 
            padding-top: 2px;
            outline: none;
            min-height: 12px;
        }

        [contenteditable="true"]:focus { background: rgba(255,255,255,0.15); border-radius: 4px; }

        /* Coordenadas 1-4-2-3-1 */
        #pos-GK { top: 92%; left: 50%; }
        #pos-DFI { top: 78%; left: 18%; }
        #pos-DFC1 { top: 81%; left: 39%; }
        #pos-DFC2 { top: 81%; left: 61%; }
        #pos-DFD { top: 78%; left: 82%; }
        #pos-MCD1 { top: 63%; left: 36%; }
        #pos-MCD2 { top: 63%; left: 64%; }
        #pos-MI { top: 43%; left: 18%; }
        #pos-MCO { top: 46%; left: 50%; }
        #pos-MD { top: 43%; left: 82%; }
        #pos-DC { top: 22%; left: 50%; }
    </style>
</head>
<body>

    <div class="toolbar">
        <button class="btn-download" onclick="saveImage()">⬇️ DESCARGAR ANÁLISIS PNG</button>
    </div>

    <div id="canvas-wrapper">
        <div id="canvas-container">
            <img id="club-logo" src="https://upload.wikimedia.org/wikipedia/en/thumb/5/52/Envigado_FC_logo.svg/1200px-Envigado_FC_logo.svg.png">
            
            <div id="team-title" contenteditable="true">ENVIGADO FC</div>
            
            <div class="pitch-line" id="half-line"></div>
            <div class="pitch-line" id="center-circle"></div>
            <div class="pitch-line" id="area-top"></div>
            <div class="pitch-line" id="area-bottom"></div>

            <div id="players-on-pitch"></div>
        </div>
    </div>

    <script>
        const posiciones = [
            {id: 'GK', class: 'gk', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'DFI', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'DFC1', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'DFC2', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'DFD', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'MCD1', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'MCD2', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'MI', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'MCO', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'MD', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'DC', class: '', t: 'TITULAR', s: 'SUPLENTE'}
        ];

        const pitchDiv = document.getElementById('players-on-pitch');

        posiciones.forEach(p => {
            pitchDiv.innerHTML += `
                <div class="player-unit ${p.class}" id="pos-${p.id}">
                    <div class="dot"></div>
                    <div class="name-box">
                        <span class="starter" contenteditable="true">${p.t}</span>
                        <span class="sub" contenteditable="true">${p.s}</span>
                    </div>
                </div>
            `;
        });

        function saveImage() {
            const container = document.getElementById("canvas-container");
            const team = document.getElementById('team-title').innerText;
            
            html2canvas(container, { 
                scale: 3, 
                width: 500,
                height: 720,
                useCORS: true,
                backgroundColor: "#1a4d2e"
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Nomina_${team.replace(/\s+/g, '_')}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
