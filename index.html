<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizarra Táctica - Envigado FC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --efc-orange: #f37021; --efc-green: #008f39; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: #1a1a1a; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 10px;
            color: white;
        }

        /* Barra de herramientas flotante */
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }
        .btn-orange { background: var(--efc-orange); color: white; }
        .btn-green { background: var(--efc-green); color: white; }

        /* Contenedor de la Cancha */
        #canvas-wrapper { 
            width: 100%; 
            max-width: 500px; 
            position: relative; 
        }
        
        #canvas-container { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 500 / 720; 
            background-color: #1e5631; 
            border: 5px solid #fff; 
            border-radius: 10px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        /* Líneas del campo */
        .pitch-line { position: absolute; border: 2px solid rgba(255,255,255,0.4); pointer-events: none; }
        #half-line { width: 100%; top: 50%; left: 0; border-top: 2px solid rgba(255,255,255,0.4); }
        #center-circle { width: 28%; aspect-ratio: 1; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #area-top { width: 56%; height: 15%; top: -2px; left: 50%; transform: translateX(-50%); border-top: none; }
        #area-bottom { width: 56%; height: 15%; bottom: -2px; left: 50%; transform: translateX(-50%); border-bottom: none; }

        /* Logo y Título Editable */
        #club-logo-display { position: absolute; top: 2%; right: 3%; width: 15%; height: auto; z-index: 20; cursor: pointer; }
        
        #team-title { 
            position: absolute; 
            top: 4%; 
            left: 0; 
            width: 100%; 
            text-align: center; 
            color: #fff; 
            font-size: 28px; 
            font-weight: 800; 
            text-transform: uppercase; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); 
            z-index: 10;
            outline: none;
            cursor: text;
        }

        /* Jugadores con edición directa */
        .player-unit { position: absolute; text-align: center; width: 24%; transform: translate(-50%, -50%); z-index: 5; }
        .dot { width: 28px; height: 28px; background: var(--efc-orange); border: 2.5px solid #fff; border-radius: 50%; margin: 0 auto 5px auto; }
        .gk .dot { background: #f1c40f; }
        
        .name-box { 
            background: rgba(0,0,0,0.8); 
            padding: 4px; 
            border-radius: 6px; 
            display: inline-block; 
            width: 100%; 
            border: 1px solid rgba(255,255,255,0.2); 
            cursor: text;
        }

        .starter { 
            color: #fff; 
            font-size: 15px; 
            font-weight: bold; 
            display: block; 
            outline: none;
            white-space: nowrap;
            overflow: hidden;
        }

        .sub { 
            color: #00ff6a; 
            font-size: 11px; 
            font-style: italic; 
            display: block; 
            border-top: 1px solid rgba(255,255,255,0.2); 
            margin-top: 2px; 
            outline: none;
            min-height: 12px;
        }

        /* Estilo al editar */
        [contenteditable="true"]:focus {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }

        /* Posiciones 1-4-2-3-1 */
        #pos-GK { top: 92%; left: 50%; }
        #pos-DFI { top: 78%; left: 18%; }
        #pos-DFC1 { top: 81%; left: 39%; }
        #pos-DFC2 { top: 81%; left: 61%; }
        #pos-DFD { top: 78%; left: 82%; }
        #pos-MCD1 { top: 63%; left: 36%; }
        #pos-MCD2 { top: 63%; left: 64%; }
        #pos-MI { top: 43%; left: 18%; }
        #pos-MCO { top: 46%; left: 50%; }
        #pos-MD { top: 43%; left: 82%; }
        #pos-DC { top: 22%; left: 50%; }
    </style>
</head>
<body>

    <div class="toolbar">
        <label class="btn btn-orange" for="logo-upload">📸 Escudo</label>
        <input type="file" id="logo-upload" accept="image/*" style="display:none" onchange="loadLogo(event)">
        <button class="btn btn-green" onclick="saveImage()">⬇️ Descargar PNG</button>
    </div>

    <div id="canvas-wrapper">
        <div id="canvas-container">
            <img id="club-logo-display" src="" style="display:none;">
            <div id="team-title" contenteditable="true">ENVIGADO FC</div>
            
            <div class="pitch-line" id="half-line"></div>
            <div class="pitch-line" id="center-circle"></div>
            <div class="pitch-line" id="area-top"></div>
            <div class="pitch-line" id="area-bottom"></div>

            <div id="players-on-pitch"></div>
        </div>
    </div>

    <script>
        const posiciones = [
            {id: 'GK', class: 'gk', t: 'Portero', s: 'Suplente'},
            {id: 'DFI', class: '', t: 'Lateral IZQ', s: 'Suplente'},
            {id: 'DFC1', class: '', t: 'Central IZQ', s: 'Suplente'},
            {id: 'DFC2', class: '', t: 'Central DER', s: 'Suplente'},
            {id: 'DFD', class: '', t: 'Lateral DER', s: 'Suplente'},
            {id: 'MCD1', class: '', t: 'Pivote 1', s: 'Suplente'},
            {id: 'MCD2', class: '', t: 'Pivote 2', s: 'Suplente'},
            {id: 'MI', class: '', t: 'Extremo IZQ', s: 'Suplente'},
            {id: 'MCO', class: '', t: 'Enganche', s: 'Suplente'},
            {id: 'MD', class: '', t: 'Extremo DER', s: 'Suplente'},
            {id: 'DC', class: '', t: 'Delantero', s: 'Suplente'}
        ];

        const pitchDiv = document.getElementById('players-on-pitch');

        posiciones.forEach(p => {
            pitchDiv.innerHTML += `
                <div class="player-unit ${p.class}" id="pos-${p.id}">
                    <div class="dot"></div>
                    <div class="name-box">
                        <span class="starter" contenteditable="true">${p.t}</span>
                        <span class="sub" contenteditable="true">${p.s}</span>
                    </div>
                </div>
            `;
        });

        function loadLogo(event) {
            const output = document.getElementById('club-logo-display');
            output.src = URL.createObjectURL(event.target.files[0]);
            output.style.display = 'block';
        }

        function saveImage() {
            const container = document.getElementById("canvas-container");
            const team = document.getElementById('team-title').innerText;
            
            html2canvas(container, { 
                scale: 3, 
                width: 500,
                height: 720,
                useCORS: true,
                backgroundColor: "#1e5631"
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Nomina_${team.replace(/\s+/g, '_')}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
